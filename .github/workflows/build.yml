name: Build Executables on Release

on:
  push:
    tags:
      - 'v*'   # Dispara em qualquer tag de versão, ex: v1.6.0

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Compilar executável com PyInstaller
        run: >
          pyinstaller --onefile
          --add-data "index.html;."
          --add-data "libs;libs"
          --name INAD_Cobranca
          run.py

      - name: Verificar que o executável foi gerado
        shell: bash
        run: |
          if [ ! -f "dist/INAD_Cobranca.exe" ]; then
            echo "ERRO: Executável não encontrado em dist/INAD_Cobranca.exe"
            exit 1
          fi
          echo "Executável gerado com sucesso: dist/INAD_Cobranca.exe"

      - name: Empacotar artefato
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist/INAD_Cobranca.exe, README.md, TUTORIAL_INTRANET_WINDOWS.md, index.html, inad_analytics.html, analytics.js, analytics.css, AI_CONTEXT.md, libs
          -DestinationPath INAD_Cobranca-Windows.zip

      - name: Publicar artefatos na Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: INAD_Cobranca-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
